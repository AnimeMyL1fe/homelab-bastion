---
# tasks file for vps_nginx_html
- name: create web directory 
  file:
    path: /var/www/lab-host
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: copy anime.jpg to web root
  copy:
    src: anime.jpg 
    dest: /var/www/lab-host/anime.jpg
    owner: www-data
    group: www-data
    mode: '0644'

- name: deploy index.html
  template:
    src: index.html.j2
    dest: /var/www/lab-host/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: 'test nginx and reload'