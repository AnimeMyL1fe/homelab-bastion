---
# tasks file for vps_sg
- name: install iptables
  apt:
    name: iptables-persistent
    state: present

- name: allow HTTP port 80
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "80"
    jump: ACCEPT
    comment: "Allow Let's Encrypt and HTTP"

- name: allow HTTPS port 443
  iptables:
    chain: INPUT
    protocol: tcp
    destination_port: "443"
    jump: ACCEPT
    comment: "Allow Secure HTTPS"

- name: save iptables rules to file
  shell: iptables-save > /etc/iptables/rules.v4