---
# tasks file for vps_nginx
- name: install package
  apt:
    name: "{{ item }}"
    update_cache: yes
  loop: "{{ vps_package }}"

- name: remove default site
  file:
    path: '{{ item }}'
    state: absent
  with_items:
    - '/etc/nginx/sites-enabled/default'
    - '/etc/nginx/sites-available/default'
  notify: 'test nginx and reload'

- name: bootstrap nginx
  template:
    src: bootstrap_nginx.j2
    dest: /etc/nginx/sites-available/lab-host.site
  notify: 'test nginx and reload'

- name: link bootstrap nginx
  file:
    src: /etc/nginx/sites-available/lab-host.site
    dest: /etc/nginx/sites-enabled/lab-host.site
    state: link
  notify: 'test nginx and reload'

- name: reload nginx right now 
  meta: flush_handlers

- name: generate ssl certificate 
  command: >
    certbot certonly --nginx --non-interactive --agree-tos
    --email {{ email }}
    -d lab-host.site -d www.lab-host.site
  args:
    creates: /etc/letsencrypt/live/lab-host.site/fullchain.pem

- name: deploy final prod nginx config
  template:
    src: nginx_production.conf.j2
    dest: /etc/nginx/sites-available/lab-host.site
  notify: 'test nginx and reload'

# custom html
- name: create web directory 
  file:
    path: /var/www/lab-host
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'

- name: copy anime.jpg to web root
  copy:
    src: anime.jpg 
    dest: /var/www/lab-host/anime.jpg
    owner: www-data
    group: www-data
    mode: '0644'

- name: deploy index.html
  template:
    src: index.html.j2
    dest: /var/www/lab-host/index.html
    owner: www-data
    group: www-data
    mode: '0644'
  notify: 'test nginx and reload'